<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Split PDF - PDFBABY</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="navbar">...</header>
    <div class="ad-container ad-header"><div class="ad-placeholder">Ad (728x90)</div></div>

    <main class="tool-page">
        <div class="container">
            <div class="tool-header">
                <h1>Split PDF</h1>
                <p class="tool-description">Extract pages or split by size</p>
            </div>
            <div class="tool-box" id="toolBox">
                <div class="upload-area" id="dropArea">
                    <i class="fas fa-cloud-upload-alt"></i>
                    <h3>Drag & drop a PDF here</h3>
                    <p>or</p>
                    <label for="fileInput" class="btn btn-outline">Select file</label>
                    <input type="file" id="fileInput" accept=".pdf" hidden>
                </div>
                <div class="action-area">
                    <button class="btn btn-primary btn-large" id="actionBtn" disabled>Split PDF</button>
                </div>
            </div>
            <div class="ad-container ad-after-tool"><div class="ad-placeholder">Ad (336x280)</div></div>
            <div class="result-section" id="resultSection" style="display: none;">...</div>
            <section class="tool-info">...</section>
            <div class="ad-container ad-before-footer"><div class="ad-placeholder">Ad</div></div>
        </div>
    </main>
    <footer class="site-footer">...</footer>
    <script src="js/main.js"></script>
</body>
</html>
